    // --- UTILITY COMPONENTS ---
    async function fetchGeminiText(prompt) {
      const apiKey = ""; // API Key disisipkan oleh environment
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const retries = [1000, 2000, 4000, 8000, 16000];
      
      for (let i = 0; i <= retries.length; i++) {
        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }]
            })
          });
          if (!response.ok) throw new Error("API Error");
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "Tidak ada respons dari AI.";
        } catch (error) {
          if (i === retries.length) return "Gagal terhubung ke AI setelah beberapa kali percobaan. Silakan coba lagi nanti.";
          await new Promise(r => setTimeout(r, retries[i]));
        }
      }
    }

    // Komponen Icon menggunakan Lucide
    function Icon({ name, size = 20, className = "" }) {
      const iconRef = useRef(null);
      useEffect(() => {
        if (iconRef.current && window.lucide && window.lucide.icons[name]) {
          iconRef.current.innerHTML = '';
          const svg = window.lucide.icons[name].toSvg({
            class: `lucide lucide-${name} ${className}`,
            width: size,
            height: size,
          });
          iconRef.current.innerHTML = svg;
        }
      }, [name, size, className]);
      return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
    }

    function NavButton({ active, icon, label, onClick }) {
      return (
        <button onClick={onClick} className={`flex w-full items-center rounded-xl px-4 py-3 text-sm font-semibold transition-all duration-200 ${
            active ? "bg-agro-500 text-white shadow-md shadow-agro-500/30" : "text-gray-500 hover:bg-agro-50 hover:text-agro-600"
        }`}>
          <Icon name={icon} className="mr-3" /> {label}
        </button>
      );
    }

    function MobileNavButton({ active, icon, label, onClick }) {

      const [activeTab, setActiveTab] = useState("reports"); // Default set ke reports untuk demo
      const [viewMode, setViewMode] = useState("list"); 
      
      const t = (key) => i18n[lang][key] || i18n["id"][key];

      // MOCK DATA
      const farmers = [
        { id: 1, name: "Budi Santoso", komoditas: "Padi Inpari 32", luas: 1.5, status: "Fase Vegetatif" },
        { id: 2, name: "Siti Aminah", komoditas: "Jagung Manis", luas: 0.8, status: "Fase Generatif" },
        { id: 3, name: "Ahmad Dahlan", komoditas: "Cabai Rawit", luas: 0.5, status: "Fase Vegetatif" },
      ];

      const [fieldCases, setFieldCases] = useState([
        { id: 101, date: "20 Mei 2026", reporter: "Agronomist Reza", farmer: "Budi Santoso", crop: "Cabai Rawit", symptom: "Daun mengeriting ke atas, warna kuning mozaik", status: "Menunggu Analisis" },
        { id: 102, date: "18 Mei 2026", reporter: "Agronomist Dina", farmer: "Siti Aminah", crop: "Jagung Manis", symptom: "Bercak coklat pada daun, menyebar cepat", status: "Telah Ditangani" }
      ]);

      // State AI Umum & Sensor
      const [aiDashboardReport, setAiDashboardReport] = useState("");
      const [isAiDashboardLoading, setIsAiDashboardLoading] = useState(false);
      
      const [sensorFarmerId, setSensorFarmerId] = useState(farmers[0].id);
      const [sensorData, setSensorData] = useState(null);
      const [isScanning, setIsScanning] = useState(false);
      const [aiSensorReport, setAiSensorReport] = useState("");
      const [isAiSensorLoading, setIsAiSensorLoading] = useState(false);

      // State Penyakit & Kiai
      const [kiaiResponse, setKiaiResponse] = useState("");
      const [isKiaiLoading, setIsKiaiLoading] = useState(false);
      const [selectedCase, setSelectedCase] = useState(null);

      // STATE BARU: Prediksi Gejala (Add Case)
      const [newCaseSymptom, setNewCaseSymptom] = useState("");
      const [aiSymptomPrediction, setAiSymptomPrediction] = useState("");
      const [isSymptomPredicting, setIsSymptomPredicting] = useState(false);

      // STATE BARU: Rencana Kerja (Reports)
      const [aiWeeklyPlan, setAiWeeklyPlan] = useState("");
      const [isWeeklyPlanLoading, setIsWeeklyPlanLoading] = useState(false);

      // AI Handlers
      const handleGenerateDashboardReport = async () => {
        setIsAiDashboardLoading(true);
        const prompt = `Sebagai konsultan pertanian "RUMAH NAGA", buatkan ringkasan rekomendasi aksi. Total Petani 124, Lahan 45 Ha. Berikan saran operasional dan jawab seluruhnya menggunakan ${i18n[lang].lang_name}.`;
        const result = await fetchGeminiText(prompt);
        setAiDashboardReport(result);
        setIsAiDashboardLoading(false);
      };

      const handleScanSensor = () => {
        setIsScanning(true);
        setSensorData(null);
        setAiSensorReport("");
        setTimeout(() => {
          setSensorData({
            n: Math.floor(Math.random() * 60) + 40,      
            p: Math.floor(Math.random() * 40) + 20,      
            k: Math.floor(Math.random() * 50) + 30,      
            humidity: Math.floor(Math.random() * 40) + 45, 
            temp: Math.floor(Math.random() * 12) + 24,   
            ph: (Math.random() * 2 + 5.0).toFixed(1),    
            fertility: ["Kurang", "Sedang", "Optimal"][Math.floor(Math.random() * 3)]
          });
          setIsScanning(false);
        }, 2500); 
      };

      // Handler AI Sensor: Ringkas & To the Point
      const handleAiSensorAnalysis = async () => {
        setIsAiSensorLoading(true);
        const selected = farmers.find(f => f.id == sensorFarmerId);
        
        const prompt = `Berperanlah sebagai "Bang Naga", ahli agronomi. Buatkan insight yang SANGAT SINGKAT dan TO THE POINT untuk lahan ${selected.name} (Tanaman: ${selected.komoditas}) berdasarkan data sensor ini: 
        N(${sensorData.n}), P(${sensorData.p}), K(${sensorData.k}), pH(${sensorData.ph}), Suhu(${sensorData.temp}°C), Lembap(${sensorData.humidity}%), Kesuburan(${sensorData.fertility}).
        
        Wajib format jawaban dalam 3 poin singkat berikut:
        1. 📊 Hasil: (Satu kalimat merangkum status nutrisi/tanah)
        2. 🐉 Panduan Naga Biru: (Cara aplikasi terbaik sesuai kondisi suhu/lembap saat ini)
        3. 💡 Saran: (Saran mendesak saja, misal tambah kapur jika pH < 6, atau tambah air jika kering. Jika normal, beri apresiasi).
        
        PENTING: Jangan bertele-tele. Jawab seluruhnya menggunakan ${i18n[lang].lang_name}.`;
        
        const result = await fetchGeminiText(prompt);
        setAiSensorReport(result);
        setIsAiSensorLoading(false);
      };

      const handleTanyaKiaiNugroho = async (kasus) => {
        setIsKiaiLoading(true);
        const prompt = `Berperanlah sebagai "Kiai Nugroho", seorang sesepuh ahli agronomi. Berikan "Resep Penyelesaian" untuk mengatasi gejala ${kasus.symptom} pada ${kasus.crop}. Jawab dengan sapaan hangat, diagnosis awal, resep organik/kimia, dan nasihat penutup. Jawab menggunakan ${i18n[lang].lang_name}.`;
        const result = await fetchGeminiText(prompt);
        setKiaiResponse(result);
        setIsKiaiLoading(false);
      };

      // HANDLER BARU: Prediksi Gejala
      const handlePredictSymptom = async () => {
        if(!newCaseSymptom) return;
        setIsSymptomPredicting(true);
        const prompt = `Sebagai ahli fitopatologi RUMAH NAGA, berikan prediksi penyakit singkat (1 kalimat) dan 1 kemungkinan patogen berdasarkan gejala berikut: "${newCaseSymptom}". Jawab seluruhnya menggunakan ${i18n[lang].lang_name}.`;
        const result = await fetchGeminiText(prompt);
        setAiSymptomPrediction(result);
        setIsSymptomPredicting(false);
      };

      // HANDLER BARU: Rencana Kerja Mingguan
      const handleGenerateWeeklyPlan = async () => {
        setIsWeeklyPlanLoading(true);
        const farmersData = farmers.map(f => `- ${f.name} (${f.komoditas}, ${f.status})`).join('\n');
        const prompt = `Sebagai asisten manajer pertanian RUMAH NAGA, buatkan Rencana Kerja Mingguan (To-Do List) ringkas untuk agronomis lapangan berdasarkan fase tanam berikut:\n${farmersData}\nBerikan 3-4 poin tugas spesifik (contoh: kunjungan, pemupukan susulan, persiapan panen). Format dengan emoji agar menarik. Jawab dalam ${i18n[lang].lang_name}.`;
        const result = await fetchGeminiText(prompt);
        setAiWeeklyPlan(result);
        setIsWeeklyPlanLoading(false);
      };

      // --- RENDER FUNCTIONS ---
      const LanguageDropdown = () => (
        <select value={lang} onChange={(e) => { 
          setLang(e.target.value); setAiDashboardReport(""); setAiSensorReport(""); setKiaiResponse(""); setAiSymptomPrediction(""); setAiWeeklyPlan("");

          <option value="en">🇬🇧 English</option>
          <option value="jv">ꦗꦮ Basa Jawa</option>
          <option value="zh">🇨🇳 中文</option>
        </select>
      );

      const renderDashboard = () => (
        <div className="animate-in space-y-6">
          <header className="mb-8">
            <h1 className="text-2xl font-bold text-gray-800">{t('dash_title')}</h1>
            <p className="text-gray-500 text-sm">{t('dash_subtitle')}</p>
          </header>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
             <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
                <div className="p-4 rounded-full bg-blue-100 text-blue-600 mr-5"><Icon name="users" size={28} /></div>
                <div><p className="text-sm font-medium text-gray-500">{t('stat_farmers')}</p><h3 className="text-2xl font-bold text-gray-800">124</h3></div>
             </div>
             <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
                <div className="p-4 rounded-full bg-agro-100 text-agro-600 mr-5"><Icon name="map" size={28} /></div>
                <div><p className="text-sm font-medium text-gray-500">{t('stat_area')}</p><h3 className="text-2xl font-bold text-gray-800">45 Ha</h3></div>
             </div>
             <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
                <div className="p-4 rounded-full bg-amber-100 text-amber-600 mr-5"><Icon name="wheat" size={28} /></div>
                <div><p className="text-sm font-medium text-gray-500">{t('stat_harvest')}</p><h3 className="text-2xl font-bold text-gray-800">12 Ton</h3></div>
             </div>
          </div>
        </div>
      );

      const renderDiseases = () => {
        if (viewMode === "add-case") {
          return (
            <div className="animate-in max-w-2xl mx-auto">
              <button onClick={() => { setViewMode("list"); setAiSymptomPrediction(""); setNewCaseSymptom(""); }} className="flex items-center text-gray-500 hover:text-gray-800 mb-6 font-medium text-sm transition-colors">
                <Icon name="arrow-left" size={16} className="mr-2" /> Kembali
              </button>
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sm:p-8">
                <h2 className="text-xl font-bold text-gray-800 mb-2">{t('add_case')}</h2>
                <p className="text-gray-500 text-sm mb-6 border-b pb-4">{t('add_case_desc')}</p>
                
                <form className="space-y-5" onSubmit={(e) => { e.preventDefault(); alert("Data kasus berhasil ditambahkan!"); setViewMode("list"); }}>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Pilih Lahan Petani</label>
                    <select className="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-agro-500 bg-white">
                      {farmers.map(f => <option key={f.id}>{f.name} - {f.komoditas}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">{t('tbl_symptom')}</label>
                    <textarea 
                      value={newCaseSymptom} 
                      onChange={(e) => setNewCaseSymptom(e.target.value)} 
                      rows="3" 
                      className="w-full border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-agro-500" 
                      placeholder="Contoh: Daun menguning dan berlubang, ditemukan ulat..." 
                      required
                    ></textarea>
                    
                    {/* TOMBOL PREDIKSI AI BARU */}
                    <button 
                      type="button" 
                      onClick={handlePredictSymptom} 
                      disabled={isSymptomPredicting || !newCaseSymptom} 
                      className="mt-3 text-sm bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-4 py-2 rounded-lg font-medium transition-colors flex items-center disabled:opacity-50"
                    >
                      <Icon name={isSymptomPredicting ? "loader-2" : "sparkles"} size={16} className={`mr-2 ${isSymptomPredicting ? "animate-spin" : ""}`} />
                      {isSymptomPredicting ? t('predict_loading') : t('predict_btn')}
                    </button>
                    
                    {aiSymptomPrediction && (
                      <div className="mt-3 p-4 bg-indigo-50/70 border border-indigo-100 rounded-xl text-sm text-indigo-900 leading-relaxed shadow-sm animate-in">
                        <strong>{t('ai_guess')}</strong><br/>{aiSymptomPrediction}
                      </div>
                    )}
                  </div>
                  <div className="pt-4 flex justify-end">
                    <button type="submit" className="bg-agro-600 hover:bg-agro-700 text-white px-6 py-2.5 rounded-xl font-medium shadow-md transition-colors">
                      Simpan Laporan
                    </button>
                  </div>
                </form>
              </div>
            </div>
          );
        }

        if (viewMode === "case-detail" && selectedCase) {
          return (
            <div className="animate-in max-w-4xl mx-auto space-y-6">
              <button onClick={() => { setViewMode("list"); setKiaiResponse(""); }} className="flex items-center text-gray-500 hover:text-gray-800 font-medium text-sm transition-colors">
                <Icon name="arrow-left" size={16} className="mr-2" /> Kembali
              </button>
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div className="p-6 border-b border-gray-100 bg-gray-50/50">
                  <h2 className="text-2xl font-bold text-gray-800">{selectedCase.farmer}</h2>
                  <p className="text-gray-600">{selectedCase.crop}</p>
                </div>
                <div className="p-6">
                  <div className="bg-red-50 text-red-800 p-4 rounded-xl border border-red-100 text-sm leading-relaxed mb-6">"{selectedCase.symptom}"</div>
                  <div className="mt-8 border-t border-gray-100 pt-6">
                    <div className="bg-gradient-to-r from-emerald-800 to-emerald-600 rounded-2xl p-6 sm:p-8 text-white flex justify-between items-center shadow-lg">
                      <div>
                        <h3 className="text-xl font-bold mb-2 flex items-center"><Icon name="sparkles" size={24} className="mr-2 text-amber-300" /> {t('kiai_title')}</h3>
                        <p className="text-emerald-100 text-sm max-w-md">{t('kiai_desc')}</p>
                      </div>
                      <button onClick={() => handleTanyaKiaiNugroho(selectedCase)} disabled={isKiaiLoading} className="bg-amber-400 hover:bg-amber-300 text-emerald-900 font-bold py-3 px-6 rounded-xl transition-colors shadow-md disabled:opacity-80 flex items-center">
                        {isKiaiLoading ? <Icon name="loader-2" size={18} className="animate-spin" /> : <><Icon name="file-text" size={18} className="mr-2" /> {t('kiai_btn')}</>}
                      </button>
                    </div>
                    {kiaiResponse && (
                      <div className="mt-6 animate-in bg-[#fdfbf7] border-2 border-amber-200 rounded-2xl p-6 shadow-sm">
                        <div className="text-gray-800 text-sm leading-relaxed whitespace-pre-wrap font-medium">{kiaiResponse}</div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="animate-in space-y-8">
            <header className="flex justify-between items-center">
              <div>
                <h1 className="text-2xl font-bold text-gray-800">{t('disease_title')}</h1>
              </div>
              <button onClick={() => setViewMode("add-case")} className="bg-red-500 hover:bg-red-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold transition-colors flex items-center shadow-md shadow-red-500/20">
                <Icon name="alert-triangle" size={18} className="mr-2" /> {t('add_case')}
              </button>
            </header>
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
               <table className="w-full text-left border-collapse">
                 <thead>
                   <tr className="bg-gray-50 text-gray-500 text-sm border-b border-gray-100">
                     <th className="px-6 py-4 font-medium">{t('tbl_date')}</th>
                     <th className="px-6 py-4 font-medium">{t('tbl_name')}</th>
                     <th className="px-6 py-4 font-medium">{t('tbl_symptom')}</th>
                     <th className="px-6 py-4 font-medium text-right">{t('tbl_action')}</th>
                   </tr>
                 </thead>
                 <tbody className="text-sm divide-y divide-gray-100">
                   {fieldCases.map(kasus => (
                     <tr key={kasus.id} className="hover:bg-gray-50/50">
                       <td className="px-6 py-4 text-gray-600">{kasus.date}</td>
                       <td className="px-6 py-4 font-medium text-gray-800">{kasus.farmer}<br/><span className="text-xs text-gray-500">{kasus.crop}</span></td>
                       <td className="px-6 py-4 text-gray-600">{kasus.symptom}</td>
                       <td className="px-6 py-4 text-right">
                         <button onClick={() => { setSelectedCase(kasus); setViewMode("case-detail"); }} className="text-agro-600 font-medium bg-agro-50 px-3 py-1.5 rounded-lg">{t('btn_detail')}</button>
                       </td>
                     </tr>
                   ))}
                 </tbody>
               </table>
            </div>
          </div>
        );
      }

      const renderSensorTab = () => {
        const selected = farmers.find(f => f.id == sensorFarmerId);
        let nagaBiruBottles = 0, dosisPerTank = 0, tankCount = 0;
        if (sensorData) {
            const deficitN = Math.max(0, 100 - sensorData.n);
            const deficitP = Math.max(0, 60 - sensorData.p);
            const deficitK = Math.max(0, 70 - sensorData.k);
            const luasAre = selected.luas * 100; 
            const maxDefisit = Math.max(deficitN, deficitP, deficitK);
            nagaBiruBottles = Math.ceil((maxDefisit / 15) * (luasAre / 20));
            if(nagaBiruBottles < 1) nagaBiruBottles = 1;
            dosisPerTank = maxDefisit > 40 ? 70 : 50;
            tankCount = Math.ceil(luasAre / 5); 
        }

        return (
          <div className="animate-in space-y-6 max-w-5xl mx-auto pb-10">
            <header className="mb-6 border-b border-gray-100 pb-4">
              <h1 className="text-2xl font-bold text-gray-800 flex items-center">
                <Icon name="radio" size={28} className="mr-3 text-agro-600" /> {t('sensor_title')}
              </h1>
            </header>
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center gap-5">
              <select value={sensorFarmerId} onChange={(e) => { setSensorFarmerId(e.target.value); setSensorData(null); setAiSensorReport(""); }} className="w-1/2 bg-gray-50 border border-gray-200 rounded-xl p-3">
                {farmers.map(f => <option key={f.id} value={f.id}>{f.name} - {f.komoditas} ({f.luas} Ha)</option>)}
              </select>
              <button onClick={handleScanSensor} disabled={isScanning} className="bg-agro-600 text-white font-bold py-3 px-8 rounded-full flex items-center">
                {isScanning ? t('sensor_scanning') : <><Icon name="bluetooth" size={20} className="mr-2" /> {t('sensor_scan_btn')}</>}
              </button>
            </div>

            {sensorData && (
              <div className="animate-in space-y-6">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  <div className="bg-white p-4 rounded-xl shadow-sm">Nitrogen: <b>{sensorData.n}</b> mg/kg</div>
                  <div className="bg-white p-4 rounded-xl shadow-sm">Fosfor: <b>{sensorData.p}</b> mg/kg</div>
                  <div className="bg-white p-4 rounded-xl shadow-sm">Kalium: <b>{sensorData.k}</b> mg/kg</div>
                  <div className="bg-white p-4 rounded-xl shadow-sm">pH: <b>{sensorData.ph}</b></div>
                </div>
                <div className="mt-8 bg-gradient-to-br from-blue-900 to-indigo-900 rounded-2xl overflow-hidden shadow-xl text-white">
                  <div className="p-6 md:p-8">
                     <h2 className="text-2xl font-bold mb-6">{t('calc_title')}</h2>
                     <div className="grid grid-cols-3 gap-6 bg-white/10 rounded-xl p-6">
                        <div className="text-center"><p className="text-5xl font-bold mb-2">{nagaBiruBottles}</p><p className="text-sm">Botol</p></div>
                        <div className="text-center"><p className="text-5xl font-bold mb-2">{dosisPerTank}</p><p className="text-sm">ml / Tangki</p></div>
                        <div className="text-center"><p className="text-5xl font-bold mb-2">{tankCount}</p><p className="text-sm">Tangki (Sesi)</p></div>
                     </div>
                  </div>
                  <div className="bg-blue-950/50 p-4 px-6 border-t border-white/10 flex justify-between items-center">
                     <button onClick={handleAiSensorAnalysis} disabled={isAiSensorLoading} className="bg-amber-500 hover:bg-amber-400 text-indigo-950 font-bold py-2.5 px-6 rounded-xl flex items-center">
                       {isAiSensorLoading ? <Icon name="loader-2" className="animate-spin mr-2" /> : <Icon name="sparkles" className="mr-2" />} 
                       TANYA KE BANG NAGA
                     </button>
                  </div>
                </div>
                {aiSensorReport && (
                  <div className="bg-indigo-50 border border-indigo-100 rounded-2xl p-6 shadow-sm">
                    <div className="text-gray-800 text-sm whitespace-pre-wrap font-medium">{aiSensorReport}</div>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      }

      // RENDER BARU: Menu Laporan & Rencana Kerja
      const renderReportsTab = () => (
        <div className="animate-in space-y-6">
          <header className="mb-6 border-b border-gray-100 pb-4">
            <h1 className="text-2xl font-bold text-gray-800 flex items-center">
              <Icon name="file-text" size={28} className="mr-3 text-agro-600" />
              {t('menu_reports')}
            </h1>
          </header>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center">
               <div className="bg-gray-50 h-20 w-20 rounded-full flex items-center justify-center mb-4 text-gray-400">
                  <Icon name="folder-down" size={32} />
               </div>
               <h2 className="text-lg font-bold text-gray-800 mb-2">{t('export_title')}</h2>
               <div className="flex gap-3 mt-4">
                 <button className="bg-green-600 text-white px-4 py-2 rounded-xl text-sm font-semibold flex items-center"><Icon name="file-spreadsheet" size={16} className="mr-2"/> Excel</button>
                 <button className="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-semibold flex items-center"><Icon name="file-text" size={16} className="mr-2"/> PDF</button>
               </div>
            </div>

            <div className="bg-gradient-to-br from-indigo-50 to-purple-50 p-6 rounded-2xl shadow-sm border border-indigo-100 flex flex-col">
               <div className="flex items-center mb-4">
                 <div className="bg-indigo-100 p-2 rounded-lg text-indigo-600 mr-3"><Icon name="calendar-days" size={24}/></div>
                 <h2 className="text-lg font-bold text-indigo-900">{t('plan_title')}</h2>
               </div>
               <p className="text-indigo-700/80 text-sm mb-4 flex-1">{t('plan_desc')}</p>
               
               {aiWeeklyPlan && (
                 <div className="bg-white/90 p-4 rounded-xl border border-white/50 text-sm text-gray-800 mb-4 whitespace-pre-wrap leading-relaxed shadow-sm animate-in">
                   {aiWeeklyPlan}
                 </div>
               )}

               <button 
                 onClick={handleGenerateWeeklyPlan}
                 disabled={isWeeklyPlanLoading}
                 className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all shadow-md flex items-center justify-center disabled:opacity-70"
               >
                 <Icon name={isWeeklyPlanLoading ? "loader-2" : "sparkles"} size={18} className={`mr-2 ${isWeeklyPlanLoading ? "animate-spin" : ""}`} />
                 {isWeeklyPlanLoading ? t('plan_loading') : t('plan_btn')}
               </button>
            </div>
          </div>
        </div>
      );

      return (
        <div className="flex h-screen overflow-hidden bg-[#f8fafc]">
          {/* SIDEBAR */}
          <aside className="hidden md:flex w-64 flex-col bg-white border-r border-gray-100 shadow-sm z-10">
            <div className="flex items-center h-20 px-6 border-b border-gray-50">
              <div className="bg-agro-600 p-2 rounded-lg mr-3"><Icon name="sprout" size={24} className="text-white" /></div>
              <h1 className="text-xl font-bold tracking-tight text-gray-800">RUMAH <span className="text-agro-600">NAGA</span></h1>
            </div>
            
            <nav className="flex-1 space-y-2 px-4 py-6 overflow-y-auto">
              <NavButton active={activeTab === "dashboard"} icon="layout-dashboard" label={t('menu_dashboard')} onClick={() => { setActiveTab("dashboard"); setViewMode("list"); }} />
              <NavButton active={activeTab === "farmers"} icon="users" label={t('menu_farmers')} onClick={() => { setActiveTab("farmers"); setViewMode("list"); }} />
              <NavButton active={activeTab === "diseases"} icon="bug" label={t('menu_diseases')} onClick={() => { setActiveTab("diseases"); setViewMode("list"); }} />
              <NavButton active={activeTab === "sensor"} icon="radio" label={t('menu_sensor')} onClick={() => { setActiveTab("sensor"); setViewMode("list"); }} />
              <NavButton active={activeTab === "reports"} icon="file-text" label={t('menu_reports')} onClick={() => { setActiveTab("reports"); setViewMode("list"); }} />
            </nav>

            <div className="p-4 border-t border-gray-50">
              <div className="mb-4"><LanguageDropdown /></div>
              <div className="flex items-center px-2 py-2">
                <img src="https://ui-avatars.com/api/?name=Agronomist&background=10b981&color=fff" alt="User" className="h-9 w-9 rounded-full object-cover mr-3" />
                <div><p className="text-sm font-semibold text-gray-800">Reza Pahlawan</p><p className="text-xs text-gray-500">{t('role')}</p></div>
              </div>
            </div>
          </aside>

          {/* MAIN CONTENT AREA */}
          <div className="flex flex-1 flex-col overflow-hidden relative">
            <header className="md:hidden flex items-center justify-between bg-white h-16 px-4 shadow-sm z-10">
              <div className="flex items-center">
                <div className="bg-agro-600 p-1.5 rounded-md mr-2"><Icon name="sprout" size={20} className="text-white" /></div>
                <h1 className="text-lg font-bold text-gray-800">RUMAH NAGA</h1>
              </div>
              <div className="w-24"><LanguageDropdown /></div>
            </header>

            <main className="flex-1 overflow-x-hidden overflow-y-auto p-4 md:p-8 pb-24 md:pb-8">
              {activeTab === "dashboard" && renderDashboard()}
              {activeTab === "diseases" && renderDiseases()}
              {activeTab === "sensor" && renderSensorTab()}
              {activeTab === "reports" && renderReportsTab()}
              {activeTab === "farmers" && (
                <div className="text-center p-10 bg-white rounded-xl">Silakan buka tab "Sensor", "Penyakit" atau "Laporan" untuk mencoba AI terbaru.</div>
              )}
            </main>

            {/* BOTTOM NAV (Mobile) */}
            <nav className="md:hidden absolute bottom-0 w-full bg-white border-t border-gray-200 flex justify-between px-2 py-2 pb-safe z-20">
              <MobileNavButton active={activeTab === "dashboard"} icon="layout-dashboard" label={t('menu_dashboard')} onClick={() => setActiveTab("dashboard")} />
              <MobileNavButton active={activeTab === "sensor"} icon="radio" label={t('menu_sensor')} onClick={() => setActiveTab("sensor")} />
              <MobileNavButton active={activeTab === "diseases"} icon="bug" label={t('menu_diseases')} onClick={() => setActiveTab("diseases")} />
              <MobileNavButton active={activeTab === "reports"} icon="file-text" label={t('menu_reports')} onClick={() => setActiveTab("reports")} />
            </nav>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
